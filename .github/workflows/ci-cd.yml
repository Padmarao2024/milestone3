name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt -r ingestor/requirements.txt -r probes/requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Tests with coverage
        run: |
          pytest \
            --cov=pipeline.config \
            --cov=pipeline.eval \
            --cov=pipeline.quality \
            --cov=pipeline.serve \
            --cov=pipeline.transform \
            --cov-report=term-missing \
            --cov-fail-under=70

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-and-quality
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        run: echo "image_ref=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/recommender-api:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/recommender-api:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/recommender-api:latest

  deploy-cloud-run:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.CLOUD_RUN_REGION }}
          image: ${{ needs.build-and-push.outputs.image_ref }}
