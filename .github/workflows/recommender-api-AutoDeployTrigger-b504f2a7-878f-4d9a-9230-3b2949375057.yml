name: Trigger auto deployment for recommender-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/recommender-api-AutoDeployTrigger-b504f2a7-878f-4d9a-9230-3b2949375057.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RECOMMENDERAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RECOMMENDERAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RECOMMENDERAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: index.docker.io/v1
          registryUsername: ${{ secrets.RECOMMENDERAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RECOMMENDERAPI_REGISTRY_PASSWORD }}
          containerAppName: recommender-api
          resourceGroup: milestones-rg
          imageToBuild: index.docker.io/v1/recommender-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


