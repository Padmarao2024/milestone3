name: Probe API

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r probes/requirements.txt
      - name: Write Kafka TLS files
        run: |
          if [ -n "${KAFKA_SSL_CA_PEM}" ]; then
            printf "%s" "${KAFKA_SSL_CA_PEM}" > /tmp/kafka_ca.pem
          fi
          if [ -n "${KAFKA_SSL_CERT_PEM}" ]; then
            printf "%s" "${KAFKA_SSL_CERT_PEM}" > /tmp/kafka_service.cert
          fi
          if [ -n "${KAFKA_SSL_KEY_PEM}" ]; then
            printf "%s" "${KAFKA_SSL_KEY_PEM}" > /tmp/kafka_service.key
            chmod 600 /tmp/kafka_service.key
          fi
        env:
          KAFKA_SSL_CA_PEM: ${{ secrets.KAFKA_SSL_CA_PEM }}
          KAFKA_SSL_CERT_PEM: ${{ secrets.KAFKA_SSL_CERT_PEM }}
          KAFKA_SSL_KEY_PEM: ${{ secrets.KAFKA_SSL_KEY_PEM }}
      - run: python probes/probe.py
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          KAFKA_SECURITY_PROTOCOL: ${{ secrets.KAFKA_SECURITY_PROTOCOL }}
          KAFKA_SASL_MECHANISM: ${{ secrets.KAFKA_SASL_MECHANISM }}
          KAFKA_SSL_CA_LOCATION: /tmp/kafka_ca.pem
          KAFKA_SSL_CERTIFICATE_LOCATION: /tmp/kafka_service.cert
          KAFKA_SSL_KEY_LOCATION: /tmp/kafka_service.key
          API_URL: ${{ secrets.API_URL }}
          TEAM: ${{ secrets.TEAM }}
